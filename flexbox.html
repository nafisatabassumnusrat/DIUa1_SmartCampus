<!DOCTYPE html>
<html>

<head>
    <title>Flexbox Example</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            /* Enable Flexbox */
            flex-direction: row;
            /* Horizontal layout */
            justify-content: space-between;
            /* Space between items */
            align-items: center;
            /* Vertical center */
            flex-wrap: wrap;
            /* Responsive */
            gap: 5px;
            /* Space between boxes */
            padding: 20px;
            height: 100px;
            background-color: #6c6a6a;
        }

        .box {
            width: 150px;
            height: 100px;
            background-color: coral;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>

</body>

</html>
