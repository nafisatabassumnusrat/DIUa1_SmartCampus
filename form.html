<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1>Student Information Form</h1>
    <form action="#" method="post">
        <label for=" name">Full Name:</label>  <br>
        <input type="text" id="name" placeholder="Enter your full name"> 

        <br><br>

        <label for=" email">Email:</label>  <br>
        <input type="email" id="email" placeholder="Enter your Email">

        <br><br>

        <label for=" password">Password:</label>  <br>
        <input type="password" id="password" placeholder="Enter your password">

        <br><br>
        <label for="dob"> Date of Birth: </label> <br>
        <input type="date" name="dob" id="dob">

        <br><br>
        
        <label for="gender">Gender: </label> <br>
        <input type="radio" name="male" id="male">Male
        <input type="radio" name="female" id="female">Female
        <br><br>

        <label for="skill">Skills </label> <br>
        <input type="checkbox" name="html" id="html">HTML
        <input type="checkbox" name="css" id="css">CSS
        <br><br>


        <label for="department"> Department</label> <br>
        <select name="Dept" id="">
            <option value="">--Select--</option>
            <option value="CSE">Computer science and enginering</option>
            <option value="CIS ">CIS</option>
            <option value="Software ">Sofware</option>
        </select>
        <br><br>

        <label for="address"> Address</label> <br>
        <textarea name="address" id="address" cols="30" rows="10" placeholder="Enter Your Address"></textarea>
        
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        
    </form>

    <h1>Student Registration Form</h1>

    <form action="#">

    <label for="student id">Student ID: </label> <br>
    <input type="text" name="id" id="id" placeholder="Enter Your ID">

    <br><br>

    <label for="course name">Course Name: </label><br>
    <input type="text" name="course name" id="course name" placeholder="Enter Course Name"> 

    <br> <br>

    <select name="Semester" id="semester">
        <option value="">--Select Semester--</option>
        <option value="1st">1st</option>
        <option value="2nd">2nd</option>
        <option value="3rd">3rd</option>
        <option value="4th">4th</option>
    </select>
    <br><br>

    <label for="section">Section:</label>
    <select name="section" id="section">
        <option value="A">A</option>
    </select>
    <br><br>

    <label for="course type">Course Type: </label><br>
    <input type="radio" name="theory" id="theory">Theory
    <input type="radio" name="lab" id="lab">Lab


    <br><br>
    <label for="additional notes">Additional Notes: </label><br>
    <textarea name="notes" id="notes" cols="30" rows="5" placeholder="Any Special request"></textarea>

    <br><br>
    <button type="submit">Register Course</button>
    <button type="reset">Clear</button>

</form>
