<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subjects Table</title>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 700px;
    font-family: "Times New Roman", Times, serif; /* Matches the printed serif font */
    font-size: 18px;
  }
  
  th, td {
    border: 2px solid black; /* Distinct borders like the printed page */
    padding: 10px 15px;
    vertical-align: top;
  }

  th {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  /* Adjust list spacing to look more like the image */
  ol, ul {
    margin: 5px 0;
    padding-left: 25px;
  }
  
  li {
    margin-bottom: 5px;
  }
</style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th>Science</th>
      <th>Commerce</th>
      <th>Humanities</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>
        <ol type="A">
          <li>Physic</li>
          <li>Chemistry</li>
          <li>Math</li>
          <li>Biology</li>
        </ol>
      </td>
      <td>
        <ul>
          <li>Accounting</li>
          <li>Management</li>
          <li>Finance</li>
          <li>Statistic</li>
        </ul>
      </td>
      <td>
        <ol type="I">
          <li>History</li>
          <li>Islamic history</li>
          <li>Home Science</li>
          <li>Economics</li>
        </ol>
        <ol type="1">
            <li>Geography</li>
            <li>Philosophy</li>
            <li>Psychology</li>
            <li>Sociology</li>
        </ol>
        <ul type="disc"></ul>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
